<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Info-stealer silently watching saved passwords in a browser window">
<defs>
<style>
text{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,'Liberation Mono',monospace}
.dim{fill:#7a7a82}.txt{fill:#e8e8ec}.red{fill:#ff003c}.cyan{fill:#00e5ff}.mag{fill:#ff35e0}
.eye{font-size:15px;letter-spacing:2px}
.row{font-size:16px;letter-spacing:.2px}
.huge{font-size:40px;font-weight:800;letter-spacing:1px}
.lab{font-size:15px;letter-spacing:3px}
@keyframes sweep{0%{transform:translateY(-24px)}100%{transform:translateY(384px)}}
.sweep{animation:sweep 6s linear infinite}
@keyframes scanrow{0%{transform:translateY(0)}100%{transform:translateY(96px)}}
.scanrow{animation:scanrow 2.6s ease-in-out infinite alternate}
@keyframes look{0%,100%{transform:translateX(-9px)}50%{transform:translateX(9px)}}
.pupil{animation:look 3.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.18}50%{opacity:.4}}
.glow{animation:pulse 3s ease-in-out infinite}
@keyframes flow{0%{transform:translateX(0);opacity:0}15%{opacity:1}85%{opacity:1}100%{transform:translateX(150px);opacity:0}}
.f1{animation:flow 2.2s linear infinite}
.f2{animation:flow 2.2s linear .7s infinite}
.f3{animation:flow 2.2s linear 1.4s infinite}
@keyframes jit{0%,90%,100%{transform:translate(0,0)}92%{transform:translate(-3px,1px)}95%{transform:translate(2px,-1px)}}
.glitch{animation:jit 4.6s steps(1) infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.rec{animation:blink 1.1s steps(1) infinite}
</style>
<pattern id="scan2" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#000" opacity="0.30"/></pattern>
<clipPath id="win"><rect x="36" y="118" width="540" height="216" rx="8"/></clipPath>
</defs>

<rect width="1200" height="380" fill="#0a0a0c"/>
<rect x="8" y="8" width="1184" height="364" rx="6" fill="none" stroke="#1b1b22"/>

<text class="dim eye" x="40" y="44">// INTERCEPTED · <tspan class="cyan">DECODING</tspan></text>
<text class="dim eye" x="1160" y="44" text-anchor="end">FILE_02.bin</text>
<line x1="24" y1="60" x2="1176" y2="60" stroke="#1b1b22"/>

<!-- browser window -->
<rect x="36" y="118" width="540" height="216" rx="8" fill="#0d0d10" stroke="#1b1b22"/>
<rect x="36" y="118" width="540" height="34" rx="8" fill="#101015"/>
<circle cx="58" cy="135" r="5" fill="#ff003c"/><circle cx="78" cy="135" r="5" fill="#ff35e0"/><circle cx="98" cy="135" r="5" fill="#00e5ff"/>
<circle cx="540" cy="135" r="4" class="red rec"/><text class="eye red rec" x="520" y="140" text-anchor="end">REC</text>
<!-- address bar -->
<rect x="120" y="124" width="370" height="20" rx="10" fill="#0a0a0c" stroke="#1b1b22"/>
<rect x="131" y="130" width="9" height="8" rx="1.5" fill="none" stroke="#36e27a" stroke-width="1.5"/>
<path d="M132.5 130 v-2.5 a3 3 0 0 1 6 0 v2.5" fill="none" stroke="#36e27a" stroke-width="1.5"/>
<text class="dim" x="150" y="138" font-size="13">https://login.example-bank.com</text>

<!-- saved credential rows + scanning highlight -->
<g clip-path="url(#win)">
<g class="row">
<text class="dim" x="60" y="190">accounts.google.com</text><text class="red" x="370" y="190">••••••••</text>
<text class="dim" x="60" y="226">login.example-bank.com</text><text class="red" x="370" y="226">••••••••</text>
<text class="dim" x="60" y="262">store.steam.com</text><text class="red" x="370" y="262">••••••••</text>
<text class="dim" x="60" y="298">id.riotgames.com</text><text class="red" x="370" y="298">••••••••</text>
</g>
<rect class="scanrow" x="44" y="170" width="524" height="30" fill="#00e5ff" opacity="0.10"/>
<line class="scanrow" x1="44" y1="200" x2="568" y2="200" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
</g>

<!-- exfil dots flowing out of the browser toward the watcher -->
<g>
<circle class="f1 red" cx="588" cy="200" r="4"/>
<circle class="f2 mag" cx="588" cy="216" r="4"/>
<circle class="f3 cyan" cx="588" cy="184" r="4"/>
</g>

<!-- the watcher: predator eye -->
<g transform="translate(852,176)">
<ellipse class="glow cyan" cx="0" cy="0" rx="96" ry="58"/>
<path d="M-86 0 Q0 -62 86 0 Q0 62 -86 0 Z" fill="#0a0a0c" stroke="#00e5ff" stroke-width="2.5"/>
<circle cx="0" cy="0" r="34" fill="none" stroke="#00e5ff" stroke-width="2"/>
<g class="pupil"><circle cx="0" cy="0" r="16" fill="#ff003c"/><circle cx="0" cy="0" r="6" fill="#0a0a0c"/></g>
</g>

<!-- headline -->
<g transform="translate(744,300)">
<g class="glitch">
<text class="huge red" x="2" y="0" opacity="0.85">SILENT PREDATORS</text>
<text class="huge cyan" x="-2" y="0" opacity="0.85">SILENT PREDATORS</text>
<text class="huge txt" x="0" y="0">SILENT PREDATORS</text>
</g>
<text class="lab dim" x="2" y="30">INFO-STEALERS 101 · <tspan class="red">SIGNAL: ACTIVE</tspan></text>
</g>

<rect width="1200" height="380" fill="url(#scan2)"/>
<rect class="sweep" x="8" y="0" width="1184" height="16" fill="#00e5ff" opacity="0.06"/>
</svg>
