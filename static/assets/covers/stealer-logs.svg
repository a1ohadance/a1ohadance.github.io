<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Stealer logs: over one million stolen credentials being decoded">
<defs>
<style>
text{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,'Liberation Mono',monospace}
.dim{fill:#7a7a82}.txt{fill:#e8e8ec}.red{fill:#ff003c}.cyan{fill:#00e5ff}.mag{fill:#ff35e0}.grn{fill:#36e27a}
.eye{font-size:15px;letter-spacing:2px}
.code{font-size:17px;letter-spacing:.2px}
.huge{font-size:60px;font-weight:800;letter-spacing:-1px}
.lab{font-size:15px;letter-spacing:3px}
@keyframes sweep{0%{transform:translateY(-24px)}100%{transform:translateY(384px)}}
.sweep{animation:sweep 5.5s linear infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.cur{animation:blink 1s steps(1) infinite}
@keyframes jit{0%,90%,100%{transform:translate(0,0)}92%{transform:translate(-3px,1px)}95%{transform:translate(2px,-1px)}97%{transform:translate(-1px,0)}}
.glitch{animation:jit 4.2s steps(1) infinite}
@keyframes bar{0%,100%{transform:scaleY(.32)}50%{transform:scaleY(1)}}
.bar{transform-box:fill-box;transform-origin:bottom center}
.b1{animation:bar 1.1s ease-in-out infinite}
.b2{animation:bar 1.1s ease-in-out .18s infinite}
.b3{animation:bar 1.1s ease-in-out .36s infinite}
.b4{animation:bar 1.1s ease-in-out .54s infinite}
@keyframes dec{0%,100%{opacity:.28}50%{opacity:1}}
.decode{animation:dec 3s ease-in-out infinite}
</style>
<pattern id="scan1" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#000" opacity="0.30"/></pattern>
</defs>

<rect width="1200" height="380" fill="#0a0a0c"/>
<rect x="8" y="8" width="1184" height="364" rx="6" fill="none" stroke="#1b1b22"/>
<line x1="636" y1="72" x2="636" y2="356" stroke="#1b1b22"/>

<text class="dim eye" x="40" y="44">// INCOMING TRANSMISSION · <tspan class="cyan">DECODING</tspan></text>
<text class="dim eye" x="1160" y="44" text-anchor="end">FILE_01.bin</text>
<line x1="24" y1="60" x2="1176" y2="60" stroke="#1b1b22"/>

<g class="code">
<text class="dim" x="40" y="108"># stealer log · url:username:password</text>
<text class="txt" x="40" y="146">auth.riotgames.com:<tspan class="cyan">player_one</tspan>:<tspan class="red">••••••••</tspan></text>
<text class="txt decode" x="40" y="182">mail.google.com:<tspan class="cyan">v.korad</tspan>:<tspan class="red">••••••••</tspan></text>
<text class="txt" x="40" y="218">id.bank.example:<tspan class="cyan">acc_4471</tspan>:<tspan class="red">••••••••</tspan></text>
<text class="txt" x="40" y="254">store.steam.com:<tspan class="cyan">ggwp_main</tspan>:<tspan class="red">••••••••</tspan></text>
<text class="grn" x="40" y="300">[ OK ] 1,043,920 records parsed <tspan class="red cur">█</tspan></text>
</g>

<g transform="translate(672,176)">
<g class="glitch">
<text class="huge red" x="3" y="0" opacity="0.85">1,000,000+</text>
<text class="huge cyan" x="-3" y="0" opacity="0.85">1,000,000+</text>
<text class="huge txt" x="0" y="0">1,000,000+</text>
</g>
<text class="lab dim" x="3" y="40">STOLEN CREDENTIALS · STEALER LOGS</text>
<g transform="translate(3,64)">
<rect class="cyan bar b1" x="0" y="0" width="7" height="26"/>
<rect class="cyan bar b2" x="12" y="0" width="7" height="26"/>
<rect class="cyan bar b3" x="24" y="0" width="7" height="26"/>
<rect class="cyan bar b4" x="36" y="0" width="7" height="26"/>
<text class="lab dim" x="56" y="20">SIGNAL: <tspan class="red">ACTIVE</tspan></text>
</g>
</g>

<rect width="1200" height="380" fill="url(#scan1)"/>
<rect class="sweep" x="8" y="0" width="1184" height="16" fill="#00e5ff" opacity="0.06"/>
</svg>
